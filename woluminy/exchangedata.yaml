apiVersion: v1
kind: Pod
metadata:
  name: sharevol
spec:
  containers:
    - name: c1
      image: ubuntu:20.04
      command:
        - "/bin/bash"
        - "-c"
        - "sleep 10000"
      volumeMounts:
        - name: xchange
          mountPath: "/tmp/xchange" #  wolumen dostępny pod <mountPath>/<name>, tutaj /tmp/xchange

    - name: c2
      image: ubuntu:20.04
      command:
        - "/bin/bash"
        - "-c"
        - "sleep 10000"
      volumeMounts:
        - name: xchange
          mountPath: "/tmp/data" # ten sam wolumen dostępny pod inną ścieżką, tutaj /tmp/data

  volumes:
    - name: xchange
      emptyDir: {} # NIE PRZETRWA RESTARTU PODA